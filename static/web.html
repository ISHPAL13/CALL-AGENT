<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Agent (Web Mode)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --card: #111827;
            --card-border: rgba(56, 189, 248, 0.1);
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.15);
            --danger: #ef4444;
            --success: #22c55e;
            --text: #f1f5f9;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.05) 0%, transparent 50%),
                              radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.05) 0%, transparent 50%);
        }

        .container {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            width: 95%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), 0 0 80px var(--primary-glow);
            display: flex;
            flex-direction: column;
        }

        .logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 1.2rem;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 8px 24px rgba(56, 189, 248, 0.2);
        }

        h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.3rem; }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; }

        #mic-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.2rem;
            background: linear-gradient(135deg, var(--primary), #0ea5e9);
            box-shadow: 0 8px 30px rgba(56, 189, 248, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #111;
        }

        #mic-btn:hover { transform: scale(1.1); box-shadow: 0 12px 40px rgba(56, 189, 248, 0.45); }
        #mic-btn.active {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            box-shadow: 0 8px 30px rgba(239, 68, 68, 0.4);
            animation: pulse 2s infinite;
            color: white;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .status { font-weight: 500; margin-bottom: 1.5rem; color: var(--text-muted); font-size: 0.9rem; }

        .transcript-container {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            height: 250px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            text-align: left;
        }
        
        .transcript-header {
            background: rgba(255,255,255,0.03);
            padding: 10px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: 600;
        }

        .transcript-area {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-user {
            background: rgba(56, 189, 248, 0.15);
            border: 1px solid rgba(56, 189, 248, 0.2);
            color: #e0f2fe;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .msg-ai {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #f1f5f9;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .msg-system {
            align-self: center;
            font-size: 0.8rem;
            color: #64748b;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎙️</div>
        <h1>Web Agent</h1>
        <p class="subtitle">Direct Voice Interface via WebSockets</p>

        <button id="mic-btn">🎙️</button>
        <p id="status-text" class="status">Click to Connect</p>

        <div class="transcript-container">
            <div class="transcript-header">Live Conversation</div>
            <div id="transcript-area" class="transcript-area">
                <div class="message msg-system">Ready and waiting...</div>
            </div>
        </div>
    </div>
    
    <script>
        const btn = document.getElementById('mic-btn');
        const statusText = document.getElementById('status-text');
        const transcriptArea = document.getElementById('transcript-area');
        
        let ws, audioCtx, mic, processor;
        let isRunning = false;

        function addMessage(role, text) {
            // Remove the system waiting message
            if (transcriptArea.children.length === 1 && transcriptArea.children[0].classList.contains("msg-system")) {
                transcriptArea.innerHTML = '';
            }
            
            const div = document.createElement('div');
            div.className = `message msg-${role}`;
            div.textContent = role === 'ai' ? `🤖 ${text}` : text;
            transcriptArea.appendChild(div);
            transcriptArea.scrollTop = transcriptArea.scrollHeight;
        }

        btn.onclick = async () => {
            if (isRunning) {
                // Hard reload to disconnect stream
                return location.reload();
            }
            
            statusText.innerText = "Authorizing microphone...";
            
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({sampleRate: 16000});
                const stream = await navigator.mediaDevices.getUserMedia({audio: {
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true
                }});
                
                statusText.innerText = "Connecting to Agent Engine...";
                
                // Keep HTTPs/WSS secure fallback logic
                const protocol = location.protocol === "https:" ? "wss:" : "ws:";
                ws = new WebSocket(`${protocol}//${location.host}/web-stream`);
                ws.binaryType = "arraybuffer";

                ws.onopen = () => {
                    statusText.innerText = "Listening... (Click to hang up)";
                    statusText.style.color = "var(--success)";
                    btn.classList.add('active');
                    btn.innerHTML = "⏹️";
                    isRunning = true;
                    addMessage("system", "Connected! Start speaking.");

                    mic = audioCtx.createMediaStreamSource(stream);
                    processor = audioCtx.createScriptProcessor(4096, 1, 1);
                    mic.connect(processor);
                    processor.connect(audioCtx.destination);
                    
                    processor.onaudioprocess = (e) => {
                        if (ws.readyState === WebSocket.OPEN) {
                            const float32Data = e.inputBuffer.getChannelData(0);
                            const int16Data = new Int16Array(float32Data.length);
                            for (let i = 0; i < float32Data.length; i++) {
                                let s = Math.max(-1, Math.min(1, float32Data[i]));
                                int16Data[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                            }
                            ws.send(int16Data.buffer); // Binary Audio out
                        }
                    };
                };

                let nextStartTime = 0;
                
                ws.onmessage = (event) => {
                    // Check if Binary Audio from Gemini or JSON Transcript
                    if (typeof event.data === "string") {
                        try {
                            const payload = JSON.parse(event.data);
                            if (payload.role && payload.text) addMessage(payload.role, payload.text);
                        } catch (e) {}
                    } else {
                        // Binary Audio Playback
                        const int16 = new Int16Array(event.data);
                        const float32 = new Float32Array(int16.length);
                        for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;
                        
                        const buffer = audioCtx.createBuffer(1, float32.length, 24000); // Gemini is 24kHz
                        buffer.getChannelData(0).set(float32);
                        
                        const source = audioCtx.createBufferSource();
                        source.buffer = buffer;
                        source.connect(audioCtx.destination);
                        
                        if (nextStartTime < audioCtx.currentTime) nextStartTime = audioCtx.currentTime;
                        source.start(nextStartTime);
                        nextStartTime += buffer.duration;
                    }
                };
                
                ws.onclose = () => {
                    statusText.innerText = "Agent Disconnected.";
                    btn.classList.remove('active');
                    btn.innerHTML = "🎙️";
                    addMessage("system", "Session closed by server.");
                };
                
            } catch (err) {
                statusText.innerText = "Microphone Denied or Failed";
                statusText.style.color = "var(--danger)";
            }
        };
    </script>
</body>
</html>
